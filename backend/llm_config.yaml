# llm_config.yaml
# Active Model Selection for Google Gemini:
# - "gemini-2.5-flash-lite"  (Recommended: Fast 1s response, healthy free-tier quota)
# - "gemini-3.1-flash-lite"  (Fast 2s response, healthy free-tier quota)
# - "gemini-3.5-flash"       (Newer preview, subject to temporary high demand limitations)
# - "gemini-2.5-flash"       (Free limit: 20 requests per day)
# - "gemini-2.0-flash"       (Free limit: 0 requests per day on free tier unless billing linked)
# - "gemini-2.5-pro"         (Free limit: 0 requests per day on free tier unless billing linked)
# - "gemini-flash-lite-latest" (Fallback: Stable Flash Lite version, 2.4s response)
gemini_model: "gemini-2.5-flash-lite"

models:
  - name: "OPENAI_API"
    active: false
  - name: "GOOGLE_GEMINI_API"
    active: false
  - name: "AMAZON_NOVA_BEDROCK"
    active: false
  - name: "GPTOSS_20B_BEDROCK"
    active: true
  - name: "AWS_BEDROCK_CLAUDE"
    active: false

